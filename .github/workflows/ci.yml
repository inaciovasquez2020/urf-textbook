name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

- name: Install TeX Live + latexmk
  run: |
    sudo apt-get update
    sudo apt-get install -y texlive-full latexmk

- name: Build PDF
  run: |
    latexmk -pdf -interaction=nonstopmode -halt-on-error manuscript/main.tex
