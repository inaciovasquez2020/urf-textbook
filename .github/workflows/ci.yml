name: CI

on:
  push:
  pull_request:

jobs:
  latex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-full \
            latexmk \
            biber

      - name: Compile textbook
        run: latexmk -pdf main.tex

      - name: Compile journal article
        run: latexmk -pdf journal/urf_core.tex
