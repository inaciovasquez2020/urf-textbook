name: Build LaTeX PDF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live + latexmk + pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full latexmk pandoc

      - name: Build PDF
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error manuscript/main.tex

      - name: Build HTML
        run: |
          pandoc manuscript/main.tex -s -o urf-textbook.html || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: urf-textbook-artifacts
          path: |
            manuscript/main.pdf
            urf-textbook.html
