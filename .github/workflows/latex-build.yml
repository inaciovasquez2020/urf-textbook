name: LaTeX Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX
        run: sudo apt-get update && sudo apt-get install -y texlive-full

      - name: Build textbook
        run: latexmk -pdf main.tex

      - name: Build journal article
        run: latexmk -pdf journal/urf_core.tex
