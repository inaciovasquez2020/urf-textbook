name: LaTeX Build

on:
  push:
  pull_request:

jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-full \
            latexmk \
            biber

      - name: Build textbook
        run: latexmk -pdf main.tex

      - name: Build journal article
        run: latexmk -pdf journal/urf_core.tex

      - name: Upload PDFs
        uses: actions/upload-artifact@v6
        with:
          name: urf-pdfs
          path: |
            main.pdf
            journal/urf_core.pdf
