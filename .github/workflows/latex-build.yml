makeindex main || true
pdflatex main.tex
pdflatex main.tex
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: urf-textbook-pdf
          path: |
            *.pdf
      - name: Install TeX Live + latexmk + pandoc
        run: |
          sudo apt-get update
