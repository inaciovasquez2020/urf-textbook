name: Build LaTeX PDF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full

      - name: Build PDF
        run: |
          if [ -f Makefile ]; then
            make
          else
            pdflatex main.tex
            bibtex main || true
            pdflatex main.tex
            pdflatex main.tex
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: urf-textbook-pdf
          path: |
            *.pdf
