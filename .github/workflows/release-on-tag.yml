name: Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX + latexmk
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full latexmk
          sudo apt-get update
sudo apt-get install -y texlive-full latexmk latexmk

      - name: Build PDF
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error manuscript/main.tex
          mv manuscript/main.pdf urf-textbook-${GITHUB_REF_NAME}.pdf

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: urf-textbook-${{ github.ref_name }}.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
