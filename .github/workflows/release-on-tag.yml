name: Release on Tag

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live + latexmk
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full latexmk
          sudo apt-get update
sudo apt-get install -y texlive-full latexmk latexmk

      - name: Build PDF
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error manuscript/main.tex

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: manuscript/main.pdf
