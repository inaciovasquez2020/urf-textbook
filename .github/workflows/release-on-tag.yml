name: Release on Tag

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full latexmk biber makeindex

      - name: Build PDFs
        run: |
          latexmk -pdf main.tex
          latexmk -pdf journal/urf_core.tex

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.pdf
            journal/urf_core.pdf

