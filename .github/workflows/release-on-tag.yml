name: Release on Tag

on:
  push:
    tags:
      - 'v*'
      - 'journal-*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX
        run: sudo apt-get update && sudo apt-get install -y texlive-full

      - name: Build textbook
        run: latexmk -pdf main.tex

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: main.pdf
