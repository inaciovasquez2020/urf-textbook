name: pages
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live (minimal) + deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra \
            latexmk make ghostscript python3

      - name: Build PDF
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error main.tex

      - name: Build HTML (tex4ht)
        run: |
          make4ht -u -f html5+unicode main.tex

      - name: Stage site
        run: |
          mkdir -p _site
          cp -f main.pdf _site/
          cp -f main.html _site/index.html || true
          cp -rf docs/* _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
